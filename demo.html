<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>md-live-preview — Obsidian Engine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
#toolbar { padding: 8px 16px; border-bottom: 1px solid #333; font-size: 13px; color: #888; display: flex; align-items: center; gap: 12px; }
#toolbar .status { margin-left: auto; }
#toolbar .status.ok { color: #4ec9b0; }
#toolbar .status.err { color: #f44; }
#editor { flex: 1; overflow: hidden; }
.cm-editor { height: 100%; font-size: 15px; }
.cm-scroller { overflow: auto !important; padding: 0; }
.cm-content { padding: 32px 48px !important; max-width: 800px; margin: 0 auto; line-height: 1.7; }
.cm-focused { outline: none !important; }
.cm-cursor { border-left-color: #d4d4d4 !important; }
.cm-selectionBackground { background: rgba(100, 150, 255, 0.3) !important; }
/* Obsidian CSS classes that the live preview uses */
.cm-transparent { color: transparent !important; font-size: 0 !important; }
.cm-blockquote-border { color: transparent; }
.cm-line:has(.cm-blockquote-border) { border-left: 3px solid #555; padding-left: 12px; }
.cm-active { background: rgba(255,255,255,0.03); }
.hr { margin: 16px 0; }
.hr hr { border: none; border-top: 1px solid #555; }
.list-bullet, .list-number { color: #6ab0f3; }
.task-list-label { cursor: pointer; }
.task-list-item-checkbox { margin-right: 6px; }
.cm-underline { text-decoration: underline; color: #6ab0f3; }
.cm-link { color: #6ab0f3; }
.is-unresolved { opacity: 0.5; }
</style>
</head>
<body>
<div id="toolbar">
  <span>md-live-preview</span>
  <span class="status" id="status">Loading Obsidian engine...</span>
</div>
<div id="editor"></div>

<!-- Obsidian 依赖 -->
<script src="vendor/lib/i18next.min.js"></script>
<script src="vendor/lib/codemirror.js"></script>
<script src="vendor/lib/markdown.js"></script>
<script src="vendor/lib/turndown.js"></script>
<script src="vendor/enhance.js"></script>
<script>
// 浏览器全局 mock（最小集）
window.OBSIDIAN_DEFAULT_I18N = {};
i18next.init({ fallbackLng: 'en', ns: ['app'], defaultNS: 'app', initImmediate: false, interpolation: { escapeValue: false } });
i18next.addResourceBundle('en', 'app', {});
window.DOMPurify = { sanitize(h) { return h; }, addHook(){}, removeHook(){}, setConfig(){}, isSupported: true };
window.activeWindow = window;
window.activeDocument = document;
window.initVimMode = () => ({ Vim: {} });
window.CodeMirrorAdapter = {};
window.process = { platform: 'win32', env: {}, versions: { electron: '28.0.0' }, cwd() { return '/'; } };
window.ready = function() {};
</script>
<script src="vendor/obsidian-app.patched.js"></script>
<script>
const status = document.getElementById('status');

function createEditor() {
  if (!window.__cm6 || !window.__cm6.EditorView) {
    status.textContent = '✗ CM6 not loaded';
    status.className = 'status err';
    return;
  }

  const { EditorView, EditorState } = window.__cm6;
  const obs = window.__obsidian;

  // 创建一个最小的 mock editor 对象给 kH 使用
  const mockApp = {
    vault: {
      getConfig(key) {
        const configs = { tabSize: 4, useTab: true, readableLineLength: true, showFrontmatter: false };
        return configs[key];
      },
      adapter: { getResourcePath() { return ''; } },
      on() {}, off() {},
      getAbstractFileByPath() { return null; },
    },
    workspace: {
      openLinkText() {},
      getActiveFile() { return null; },
      on() {}, off() {},
    },
    metadataCache: {
      getFirstLinkpathDest() { return null; },
      getFileCache() { return null; },
      getCache() { return null; },
      on() {}, off() {},
    },
    internalPlugins: {
      getPluginById() { return null; },
    },
    plugins: { getPlugin() { return null; } },
    keymap: { pushScope() {}, popScope() {}, getRootScope() { return {}; } },
    isVimEnabled() { return false; },
  };

  const sampleDoc = `# Live Preview Demo

This is **bold text** and *italic text* and ~~strikethrough~~.

Inline \`code\` looks like this.

## Links

[Click here](https://example.com) to visit a link.

## Blockquotes

> This is a blockquote.
> It can span multiple lines.

## Lists

- Item one
- Item two with **bold**
- [ ] Unchecked task
- [x] Completed task

1. First ordered
2. Second ordered

## Code Block

\`\`\`javascript
const hello = "world";
console.log(hello);
\`\`\`

---

## Math

$$E = mc^2$$

Try editing — cursor reveals raw markdown, moving away renders it.
`;

  // 创建 EditorView 先（kH 需要它作为第二个参数）
  const editorEl = document.getElementById('editor');
  
  const state = EditorState.create({
    doc: sampleDoc,
    extensions: [
      EditorView.lineWrapping,
    ],
  });

  const view = new EditorView({
    state,
    parent: editorEl,
  });

  // 创建 mock editor wrapper
  const mockEditor = {
    app: mockApp,
    path: 'demo.md',
    cm: view,
    editorEl: editorEl,
    livePreviewPlugin: null,
    cleanupLivePreview: null,
    sourceMode: false,
    scope: null,
    addChild(c) { return c; },
    removeChild(c) {},
    editorSuggest: { close() {} },
  };

  // 调用 kH 获取 live preview extensions！
  try {
    const extensions = window.__kH(mockEditor, view);
    console.log('kH returned extensions:', extensions);
    
    // 重新创建带 live preview 的 state
    const newState = EditorState.create({
      doc: sampleDoc,
      extensions: [
        EditorView.lineWrapping,
        ...extensions,
      ],
    });
    
    view.setState(newState);
    status.textContent = '✓ Live preview active';
    status.className = 'status ok';
    console.log('Live preview editor created successfully!');
  } catch (e) {
    console.error('kH error:', e);
    status.textContent = '✗ kH failed: ' + e.message;
    status.className = 'status err';
    
    // Fallback: 至少显示纯编辑器
    status.textContent += ' (showing plain editor)';
  }
}

// 给 patched app.js 执行时间
setTimeout(createEditor, 50);
</script>
</body>
</html>
